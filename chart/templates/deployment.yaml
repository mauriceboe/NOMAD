apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trek.fullname" . }}
  labels:
    app: {{ include "trek.name" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "trek.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "trek.name" . }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      {{- end }}
      containers:
        - name: trek
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "trek.fullname" . }}-config
          {{- with .Values.additionalEnvFrom }}
          {{- range . }}
            - configMapRef:
                name: {{ .name }}
          {{- end }}
          {{- end }}
          {{- with .Values.additionalEnvFromSecrets }}
          {{- range . }}
            - secretRef:
                name: {{ .name }}
          {{- end }}
          {{- end }}
          env:
            # JWT secret is provided via the `jwt` values block. Precedence:
            # 1) `jwt.existingSecret` -> uses key `jwt.existingSecretKey` (default JWT_SECRET)
            # 2) `jwt.generateSecret` -> uses generated secret `<release>-jwt-secret` key `JWT_SECRET`
            # 3) `jwt.secret` -> direct value (not recommended for production)
            {{- if .Values.jwt.generateSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "trek.fullname" . }}-jwt-secret
                  key: JWT_SECRET
            {{- else if .Values.jwt.existingSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jwt.existingSecret }}
                  key: {{ .Values.jwt.existingSecretKey | default "JWT_SECRET" }}
            {{- else if .Values.jwt.secret }}
            - name: JWT_SECRET
              value: {{ .Values.jwt.secret | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "trek.fullname" . }}-data
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "trek.fullname" . }}-uploads
