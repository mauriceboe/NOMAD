{{- /*
  Secret creation logic for JWT:
  - If `jwt.existingSecret` is provided, no secret is created by the chart.
  - If `jwt.existingSecret` is empty and `jwt.generateSecret` is false, the chart will create
    a secret named `<release>-secret` containing the literal value from `jwt.secret` (base64-encoded).
  - If `jwt.generateSecret` is true and `jwt.existingSecret` is empty, the chart will create
    a secret named `<release>-jwt-secret` containing a generated random value under the key
    `JWT_SECRET` (or the key from `jwt.existingSecretKey` if set).
*/ -}}

{{- if and (not .Values.jwt.existingSecret) (not .Values.jwt.generateSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trek.fullname" . }}-secret
  labels:
    app: {{ include "trek.name" . }}
type: Opaque
data:
  {{ .Values.jwt.existingSecretKey | default "JWT_SECRET" }}: {{ .Values.jwt.secret | b64enc }}
{{- end }}

{{- if and (not .Values.jwt.existingSecret) (.Values.jwt.generateSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trek.fullname" . }}-jwt-secret
  labels:
    app: {{ include "trek.name" . }}
type: Opaque
stringData:
  {{ .Values.jwt.existingSecretKey | default "JWT_SECRET" }}: {{ randAlphaNum 32 }}
{{- end }}
