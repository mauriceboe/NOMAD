
image:
  repository: mauriceboe/trek
  tag: latest
  pullPolicy: IfNotPresent

# Optional image pull secrets for private registries
imagePullSecrets: []
  # - name: my-registry-secret

service:
  type: ClusterIP
  port: 3000

env:
  NODE_ENV: production
  PORT: 3000
  ALLOWED_ORIGINS: "*" # NOTE: If using ingress, ensure env.ALLOWED_ORIGINS matches the domains in ingress.hosts for proper CORS configuration.
  FORCE_HTTPS: "false" # Set to "true" to force HTTPS in production (requires ingress with TLS)
  OIDC_DISPLAY_NAME: "SSO" # SSO button label
  OIDC_ONLY: "false" # Set to "true" to disable local auth and only allow OIDC login
  TRUST_PROXY: "false" # Set to "true" if running behind a reverse proxy (e.g., ingress) to properly handle client IPs and HTTPS
  DEMO_MODE: "false" # Set to "true" to enable demo mode with pre-populated data and no authentication (not recommended for production)
  
  # OIDC configuration should be set via additionalEnv or additionalEnvFrom to avoid hardcoding sensitive values in the main env section. Example:
  # OIDC_ISSUER: "https://keycloak.example.com/realms/myrealm"
  # OIDC_CLIENT_ID: "trek-client"
  # OIDC_CLIENT_SECRET: "my-client-secret" # This should be stored in a Kubernetes secret and referenced here

jwt:
  # JWT secret configuration. Use one of the following approaches:
  #  - Generate a random secret at install: set `jwt.generateSecret=true`
  #  - Use an existing Kubernetes Secret: set `jwt.existingSecret` to the secret name
  #  - Provide the secret value directly (not recommended for production): set `jwt.secret`
  # `jwt.existingSecretKey` controls the key name inside the existing secret (defaults to JWT_SECRET)
  generateSecret: false
  existingSecret: ""
  existingSecretKey: JWT_SECRET
  secret: ""

# Additional environment variables to be set in the container (see Environment Variables section in README for available options)
additionalEnv: {}
# Additional environment variables from a ConfigMap (key-value pairs where value is the key in the ConfigMap)
additionalEnvFrom: []
# - name: trek-config
# Additional environment variables from Kubernetes secrets (key-value pairs where value is the key in the secret)
additionalEnvFromSecrets: []
# - name: trek-secret

persistence:
  enabled: true
  # Depending on your usage, you may want to increase this
  data:
    size: 1Gi
  uploads:
    size: 1Gi

resources: {}

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - /
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
  websocket:
    enabled: false
    # Optional annotations to ensure websocket upgrade and keepalive for ingress controllers (nginx recommended)
    annotations: {}
