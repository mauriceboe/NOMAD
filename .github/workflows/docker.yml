name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_REPO: ${{ vars.DOCKER_REPO || 'mauriceboe/trek' }}
  DOCKER_REPO_LEGACY: ${{ vars.DOCKER_REPO_LEGACY || 'mauriceboe/nomad' }}

jobs:
  build:
    # Skip entirely when Docker Hub credentials are not configured (e.g. on forks)
    if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform tag-safe name
        run: echo "PLATFORM_PAIR=$(echo ${{ matrix.platform }} | sed 's|/|-|g')" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_REPO }},push-by-digest=true,name-canonical=true,push=true
          no-cache: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./server/package.json').version")" >> $GITHUB_OUTPUT

      - name: Download build digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          mapfile -t digests < <(printf '${{ env.DOCKER_REPO }}@sha256:%s\n' *)
          tags=(-t "${{ env.DOCKER_REPO }}:latest" -t "${{ env.DOCKER_REPO }}:${{ steps.version.outputs.VERSION }}")
          if [ -n "${{ env.DOCKER_REPO_LEGACY }}" ]; then
            tags+=(-t "${{ env.DOCKER_REPO_LEGACY }}:latest" -t "${{ env.DOCKER_REPO_LEGACY }}:${{ steps.version.outputs.VERSION }}")
          fi
          docker buildx imagetools create "${tags[@]}" "${digests[@]}"

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ env.DOCKER_REPO }}:latest
