name: pulumi-drift

on:
  schedule:
    # Daily at 14:00 UTC (06:00 PT) — picks up overnight manual changes
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  drift:
    name: drift detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    defaults:
      run:
        working-directory: infra/pulumi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/pulumi/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pulumi preview --expect-no-changes
        id: preview
        uses: pulumi/actions@v6
        continue-on-error: true # don't fail the job; we want to open an issue
        with:
          command: preview
          stack-name: prod
          work-dir: infra/pulumi
          expect-no-changes: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PROVIDER_TOKEN }}

      - name: Open or update drift issue
        if: steps.preview.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[infra-drift] Atlas prod stack has drifted';
            const body = [
              '## Drift detected',
              '',
              `Detected at: ${new Date().toISOString()}`,
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Pulumi preview reported changes against the prod stack, which means',
              'the live infrastructure no longer matches the code in main.',
              '',
              '### Triage',
              '',
              '1. Open the workflow run above and review the diff.',
              '2. Decide: was the change intentional (someone made a fix manually)',
              '   or unintentional (a manual change that should be reverted)?',
              '3. If intentional: update Pulumi code and merge to align state with reality.',
              '4. If unintentional: run `pulumi up` to restore the desired state.',
              '',
              '### Why this matters',
              '',
              'Drift erodes the "redeploy, never adjust" guarantee. The longer it persists,',
              'the harder it is to safely apply Pulumi changes — every `pulumi up` becomes',
              'a risk of overwriting an undocumented manual fix.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'infra-drift',
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Drift still present as of ${new Date().toISOString()}. See [latest run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['infra-drift'],
              });
            }
