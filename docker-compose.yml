services:
  app:
    image: mauriceboe/trek:latest
    container_name: trek
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-}
      # - ALLOWED_ORIGINS=https://yourdomain.com  # Optional: restrict CORS to specific origins
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mcp:
    profiles:
      - mcp
    build:
      context: ./mcp
    environment:
      - TREK_BASE_URL=http://app:3000/api
      - TREK_EMAIL=${TREK_EMAIL:-}
      - TREK_PASSWORD=${TREK_PASSWORD:-}
      - MCP_PORT=3333
      - MCP_PATH=/mcp
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:-}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3333"
